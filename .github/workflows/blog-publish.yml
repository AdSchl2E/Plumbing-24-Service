name: Build Blog
on:
  push:
    branches: [ main ]
    paths:
      - '_blog/**'
      - '_templates/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Generate blog pages
        run: node scripts/generate-blog.js
        
      - name: Commit and push if changed
        run: |
          git config --local user.email "ad.schlee@gmail.com"
          git config --local user.name "AdSchl2E"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate blog pages" && git push)